            <li class="cabecalho__item">

<main class="contato">

    <section class="contato__titulo">

        <h1>FALE CONOSCO</h1>

        <p>
            Envie sua mensagem para a equipe OrbitSafe.
        </p>

    </section>



    <section class="contato__formulario">

    <form action="https://formsubmit.co/andreluizramosforastieri32@gmail.com" method="POST">

        <input type="hidden" name="_captcha" value="false">

        <div class="grupo-campo">

            <label for="nome">
                Nome Completo
            </label>

            <input
                type="text"
                id="nome"
                name="nome"
                required
                placeholder="Digite seu nome">

        </div>


        <div class="grupo-campo">

            <label for="email">
                E-mail
            </label>

            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="email@exemplo.com">

        </div>


        <div class="grupo-campo">

            <label for="assunto">
                Assunto
            </label>

            <select
                id="assunto"
                name="assunto"
                required>

                <option value="">
                    Selecione
                </option>

                <option value="Suporte Técnico">
                    Suporte Técnico
                </option>

                <option value="Parcerias">
                    Parcerias
                </option>

                <option value="Defesa Civil">
                    Defesa Civil
                </option>

            </select>

        </div>


        <div class="grupo-campo">

            <label for="mensagem">
                Mensagem
            </label>

            <textarea
                id="mensagem"
                name="mensagem"
                rows="6"
                required
                placeholder="Digite sua mensagem"></textarea>

        </div>


        <button
            type="submit"
            class="btn-principal">

            Enviar Mensagem

        </button>

    </form>

</section>

</main>



<footer class="rodape">

    <p>
        © 2026 OrbitSafe - Global Solution - FIAP
    </p>
