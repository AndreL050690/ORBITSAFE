        <nav class="cabecalho__navbar">

            <a href="../index.html" class="cabecalho__logo">

                <img src="../images/logo.png" alt="OrbitSafe">

            </a>

            <ul class="cabecalho__lista">

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="../index.html">
                        Home
                    </a>
                </li>

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="./sobre.html">

                <li class="cabecalho__item">

                <li class="cabecalho__item">
                    <a class="cabecalho__link" href="./dashboard.html">

                <li class="cabecalho__item">

            </ul>

        </nav>

    </header>



    <main class="contato">

        <section class="contato__titulo">

            <h1>FALE CONOSCO</h1>

            <p>
                Envie sua mensagem para a equipe OrbitSafe.
            </p>

        </section>



        <section class="contato__formulario">

            <form action="https://formsubmit.co/andreluizramosforastieri32@gmail.com" method="POST">

                <input type="hidden" name="_captcha" value="false">

                <div class="grupo-campo">

                    <label for="nome">
                        Nome Completo
                    </label>

                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">

                </div>


                <div class="grupo-campo">

                    <label for="email">
                        E-mail
                    </label>

                    <input type="email" id="email" name="email" required placeholder="email@exemplo.com">

                </div>


                <div class="grupo-campo">

                    <label for="assunto">
                        Assunto
                    </label>

                    <select id="assunto" name="assunto" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="Suporte Técnico">
                            Suporte Técnico
                        </option>

                        <option value="Parcerias">
                            Parcerias
                        </option>

                        <option value="Defesa Civil">
                            Defesa Civil
                        </option>

                    </select>

                </div>


                <div class="grupo-campo">

                    <label for="mensagem">
                        Mensagem
                    </label>

                    <textarea id="mensagem" name="mensagem" rows="6" required
                        placeholder="Digite sua mensagem"></textarea>

                </div>


                <button type="submit" class="btn-principal">

                    Enviar Mensagem

                </button>

            </form>

        </section>

    </main>



    <footer class="rodape">
        <p>© 2026 OrbitSafe - Global Solution - FIAP</p>
    </footer>

    <button class="sos-btn" id="abrirSOS">
        🚨 SOS
    </button>

    <div class="sos-modal" id="modalSOS">

        <div class="sos-conteudo">

            <h3>🚨 Emergência</h3>

            <input type="text" placeholder="Nome">

            <input type="text" placeholder="Localização">

            <textarea placeholder="Descreva a situação"></textarea>

            <button class="sos-enviar" id="enviarSOS">
                Transmitir
            </button>

            <button class="sos-fechar" id="fecharSOS">
                Fechar
            </button>

        </div>

    </div>

    <script>
        window.watsonAssistantChatOptions = {
            integrationID: "79fb87eb-c816-4fd3-aa18-846c47cedc20", // The ID of this integration.
            region: "https://integrations.us-south.assistant.watson.appdomain.cloud", // The region your integration is hosted in.
            serviceInstanceID: "0177986c-b5c0-4d7f-a7f8-b4a819fe3eaa", // The ID of your service instance.
            onLoad: async (instance) => { await instance.render(); }
        };
        setTimeout(function () {
            const t = document.createElement('script');
            t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
            document.head.appendChild(t);
        });
    </script>

    <script src="../js/script.js"></script>
